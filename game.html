<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéJS</title>

    <link rel="stylesheet" href="game-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- TELA -->
    <div class="screen">
        <img src="img/battleground.png" alt="bckg" class="battleground">

        <img src="img/sprites/pikachu.png" alt="poek1" class="poke1">
        <img src="img/sprites/marowak.webp" alt="poek2" class="poke2">

    </div>

    <div id="hp">
        <h1>HP: ${hp1}/100</h1>

        <h2>HP: ${hp2}/100</h2>
    </div>
    <!-- TEXT BOX -->
    <div id="bttextbox">
        <img src="img/textbox.png" alt="textbox" class="textbox">
        <h3>O que Pikachu vai fazer?</h3>

        <div id="actions">
            <button id="fight"><strong>Lutar</strong></button>
            <button id="run"><strong>Fugir</strong></button>
        </div>
    </div>


    <script src="gamescript.js"></script>
</body>

</html>
